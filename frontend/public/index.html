<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏏 IPL Auction System</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/auth.css">
    <link rel="stylesheet" href="/css/dashboard.css">
    <link rel="stylesheet" href="/css/room.css">
    <link rel="stylesheet" href="/css/team.css">
    <link rel="stylesheet" href="/css/leaderboard.css">
    <link rel="stylesheet" href="/css/playerPool.css">
    <link rel="stylesheet" href="/css/auctionLive.css">
</head>
<body>
    <!-- App Container -->
    <div id="app"></div>

    <!-- Navigation (shown on all pages except login/register) -->
    <nav id="navbar" class="navbar" style="display: none;">
        <div class="navbar-container">
            <div class="navbar-brand">
                <h1>🏏 IPL Auction</h1>
            </div>
            <div class="navbar-menu">
                <a href="#dashboard" class="nav-link">Dashboard</a>
                <div class="notification-wrapper">
                    <button id="notificationBell" class="notification-bell">🔔</button>
                    <span id="notificationBadge" class="notification-badge"></span>
                    <div id="notificationPanel" class="notification-panel" style="display: none;">
                        <div class="notification-header">
                            <h3>Notifications</h3>
                            <button id="markAllReadBtn" class="btn-small" onclick="NotificationService.markAllRead()">Mark all as read</button>
                        </div>
                        <div id="notificationList" class="notification-list"></div>
                    </div>
                </div>
                <span class="nav-user" id="navUser"></span>
                <button id="logoutBtn" class="btn-logout">Logout</button>
            </div>
        </div>
    </nav>

    <!-- Auth Page Template -->
    <template id="auth-page">
        <div class="auth-container">
            <div class="auth-box">
                <h1 class="auth-title">🏏 IPL Auction System</h1>
                <p class="auth-subtitle">Virtual Cricket Auction Platform</p>

                <!-- Login Form -->
                <form id="loginForm" class="auth-form">
                    <h2>Login</h2>
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Login</button>
                    <p class="auth-toggle">Don't have an account? <a href="#register" id="toggleRegister">Register here</a></p>
                </form>

                <!-- Register Form (hidden by default) -->
                <form id="registerForm" class="auth-form" style="display: none;">
                    <h2>Register</h2>
                    <div class="form-group">
                        <label for="regUsername">Username</label>
                        <input type="text" id="regUsername" placeholder="Choose a username" required>
                    </div>
                    <div class="form-group">
                        <label for="regEmail">Email</label>
                        <input type="email" id="regEmail" placeholder="Enter your email" required>
                    </div>
                    <div class="form-group">
                        <label for="regPassword">Password</label>
                        <input type="password" id="regPassword" placeholder="Create a password" required>
                    </div>
                    <div class="form-group">
                        <label for="regConfirmPassword">Confirm Password</label>
                        <input type="password" id="regConfirmPassword" placeholder="Confirm your password" required>
                    </div>
                    <button type="submit" class="btn-primary btn-full" id="registerBtn">Register</button>
                    <p class="auth-toggle">Already have an account? <a href="#login" id="toggleLogin">Login here</a></p>
                </form>

                <div id="authError" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </template>

    <!-- Dashboard Page Template -->
    <template id="dashboard-page">
        <div class="dashboard-container">
            <div class="dashboard-header">
                <h1>Auction Rooms</h1>
                <button id="createRoomBtn" class="btn-primary">+ Create New Room</button>
                <button id="joinByCodeBtn" class="btn-secondary">&#128279; Join by Code</button>
            </div>

            <div id="roomsGrid" class="rooms-grid">
                <!-- Rooms will be loaded here -->
            </div>

            <div id="noRooms" class="empty-state" style="display: none;">
                <p>No auction rooms yet. Create one to get started!</p>
            </div>
        </div>
    </template>

    <!-- Create Room Modal Template -->
    <template id="create-room-modal">
        <div class="modal-overlay" id="roomModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Create Auction Room</h2>
                    <button class="modal-close" id="closeRoomModal">&times;</button>
                </div>
                <form id="createRoomForm" class="modal-form">
                    <div class="form-group">
                        <label for="roomName">Room Name</label>
                        <input type="text" id="roomName" placeholder="e.g., IPL 2026 Main Auction" required>
                    </div>
                    <div class="form-group">
                        <label for="roomDesc">Description</label>
                        <textarea id="roomDesc" placeholder="Room description" rows="3"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="roomBudget">Budget Per Team</label>
                            <input type="number" id="roomBudget" value="100" min="50" max="200" required>
                        </div>
                        <div class="form-group">
                            <label for="roomPlayers">Max Players</label>
                            <input type="number" id="roomPlayers" value="11" min="5" max="15" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="roomStart">Start Date</label>
                            <input type="date" id="roomStart" required>
                        </div>
                        <div class="form-group">
                            <label for="roomEnd">End Date</label>
                            <input type="date" id="roomEnd" required>
                        </div>
                    </div>

                    <h3 class="form-section-title">Auction Config</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="bidIncrement">Bid Increment (Cr)</label>
                            <input type="number" id="bidIncrement" value="0.25" min="0.05" max="5" step="0.05">
                        </div>
                        <div class="form-group">
                            <label for="bidTimer">Bid Timer (sec)</label>
                            <input type="number" id="bidTimer" value="30" min="10" max="120">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="nominationOrder">Nomination Order</label>
                            <select id="nominationOrder">
                                <option value="random">Random</option>
                                <option value="base_price_desc">Highest Base Price First</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="unsoldRule">Unsold Player Rule</label>
                            <select id="unsoldRule">
                                <option value="skip">Skip</option>
                                <option value="reenter">Re-enter Pool</option>
                            </select>
                        </div>
                    </div>
                    <h4 class="form-subsection-title">Role Composition (per team)</h4>
                    <div class="form-row role-row">
                        <div class="form-group">
                            <label>Batsmen (min/max)</label>
                            <div class="inline-inputs">
                                <input type="number" id="minBatsmen" value="3" min="0" max="11" placeholder="min">
                                <input type="number" id="maxBatsmen" value="6" min="0" max="11" placeholder="max">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Bowlers (min/max)</label>
                            <div class="inline-inputs">
                                <input type="number" id="minBowlers" value="3" min="0" max="11" placeholder="min">
                                <input type="number" id="maxBowlers" value="6" min="0" max="11" placeholder="max">
                            </div>
                        </div>
                    </div>
                    <div class="form-row role-row">
                        <div class="form-group">
                            <label>All-Rounders (min/max)</label>
                            <div class="inline-inputs">
                                <input type="number" id="minAllRounders" value="1" min="0" max="11" placeholder="min">
                                <input type="number" id="maxAllRounders" value="4" min="0" max="11" placeholder="max">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Wicket-Keepers (min/max)</label>
                            <div class="inline-inputs">
                                <input type="number" id="minWK" value="1" min="0" max="4" placeholder="min">
                                <input type="number" id="maxWK" value="2" min="0" max="4" placeholder="max">
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn-primary btn-full">Create Room</button>
                </form>
                <div id="roomError" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </template>

    <!-- Room Details Page Template -->
    <template id="room-page">
        <div class="room-container">
            <div class="room-header">
                <div class="room-info">
                    <h1 id="roomTitle"></h1>
                    <p id="roomDesc"></p>
                    <div class="room-stats">
                        <span>Budget: <strong id="roomBudgetInfo"></strong></span>
                        <span>Players: <strong id="roomPlayersInfo"></strong></span>
                        <span>Teams: <strong id="roomTeamsCount"></strong></span>
                    </div>
                </div>
                <div class="room-actions">
                    <button id="createTeamBtn" class="btn-primary">+ Create Team</button>
                    <button id="viewPlayerPoolBtn" class="btn-secondary">View Player Pool</button>
                    <button id="markReadyBtn" class="btn-secondary" style="display:none;">✅ Mark as Ready</button>
                    <button id="startAuctionBtn" class="btn-success" style="display:none;">🚀 Start Auction</button>
                    <button id="enterAuctionBtn" class="btn-primary" style="display:none;">Enter Auction →</button>
                    <button id="joinRoomBtn" class="btn-secondary">Join Room</button>
                    <button id="leaveRoomBtn" class="btn-danger" style="display: none;">Leave Room</button>
                </div>
                <div class="invite-code-box" id="inviteCodeBox" style="display: none;">
                    <span class="invite-label">Invite Code</span>
                    <span class="invite-code-value" id="inviteCodeValue"></span>
                    <button class="btn-copy" id="copyInviteCodeBtn" title="Copy invite code">&#128203; Copy</button>
                </div>
            </div>

            <div class="room-content">
                <div class="teams-section">
                    <h2>Teams in Room</h2>
                    <div id="teamsGrid" class="teams-grid">
                        <!-- Teams will be loaded here -->
                    </div>
                    <div id="noTeams" class="empty-state" style="display: none;">
                        <p>No teams yet. Create your team to get started!</p>
                    </div>
                </div>

                <div class="participants-section">
                    <h2>Participants</h2>
                    <ul id="participantsList" class="participants-list">
                        <!-- Participants will be loaded here -->
                    </ul>
                </div>
            </div>
        </div>
    </template>

    <!-- Player Pool Page Template -->
    <template id="player-pool-page">
        <div class="player-pool-container">
            <div class="player-pool-header">
                <h1>IPL 2026 Player Pool</h1>
                <div class="player-pool-filters">
                    <input type="text" id="poolSearch" placeholder="Search player name...">
                    <select id="poolRoleFilter">
                        <option value="all">All Roles</option>
                        <option value="Batsman">Batsman</option>
                        <option value="Bowler">Bowler</option>
                        <option value="AllRounder">All-Rounder</option>
                        <option value="WicketKeeper">Wicket-Keeper</option>
                    </select>
                    <select id="poolTeamFilter">
                        <option value="all">All Teams</option>
                        <option value="MI">MI</option>
                        <option value="CSK">CSK</option>
                        <option value="RCB">RCB</option>
                        <option value="KKR">KKR</option>
                        <option value="DC">DC</option>
                        <option value="PBKS">PBKS</option>
                        <option value="RR">RR</option>
                        <option value="SRH">SRH</option>
                        <option value="LSG">LSG</option>
                        <option value="GT">GT</option>
                    </select>
                    <select id="poolStatusFilter">
                        <option value="all">All Status</option>
                        <option value="available">Available</option>
                        <option value="sold">Sold</option>
                        <option value="unsold">Unsold</option>
                    </select>
                </div>
            </div>

            <div class="player-pool-summary">
                <span id="poolCount">0 players</span>
            </div>

            <div id="playerPoolGrid" class="player-pool-grid"></div>

            <div id="poolEmptyState" class="empty-state" style="display: none;">
                <p>No players found for the selected filters.</p>
            </div>

            <div class="back-link">
                <a href="#room" id="backToRoomFromPool">&larr; Back to Room</a>
            </div>
        </div>
    </template>

    <!-- Live Auction Page Template -->
    <template id="auction-live-page">
      <div class="auction-live-container">
        <!-- Left: My Squad -->
        <aside class="auction-sidebar-left">
          <div class="sidebar-title">My Squad</div>
          <div id="my-budget-display" class="my-budget-display">—</div>
          <div id="my-squad-list"></div>
        </aside>

        <!-- Center: Main Auction Area -->
        <main class="auction-center" id="auction-center">
          <div id="auction-banner" class="auction-banner"></div>

          <div id="current-player-card" class="player-card-inner">
            <p style="color:#4b5563;text-align:center">Waiting for next player...</p>
          </div>

          <!-- Timer -->
          <div class="timer-container">
            <svg class="timer-ring" width="120" height="120" viewBox="0 0 120 120">
              <circle class="timer-ring-bg" cx="60" cy="60" r="54"/>
              <circle id="timer-circle" class="timer-ring-circle" cx="60" cy="60" r="54"/>
            </svg>
            <div class="timer-text-overlay"><span id="timer-text">—</span></div>
          </div>

          <!-- Current Bid -->
          <div class="current-bid-panel" id="current-bid-display">
            <div class="bid-amount no-bids">No bids yet</div>
          </div>

          <!-- Bid Button -->
          <button id="bid-btn" class="bid-btn" disabled>BID</button>

          <button id="auction-back-btn" class="auction-back-btn">← Back to Room</button>
        </main>

        <!-- Right: All Teams Purse -->
        <aside class="auction-sidebar-right">
          <div class="sidebar-title">Team Budgets</div>
          <div id="teams-sidebar-list"></div>
        </aside>
      </div>
      <div id="auction-message" class="notification"></div>
    </template>

    <!-- Create Team Modal Template -->
    <template id="create-team-modal">
        <div class="modal-overlay" id="teamModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Create Team</h2>
                    <button class="modal-close" id="closeTeamModal">&times;</button>
                </div>
                <form id="createTeamForm" class="modal-form">
                    <div class="form-group">
                        <label for="teamName">Team Name</label>
                        <input type="text" id="teamName" placeholder="e.g., Mumbai Maharajas" required>
                    </div>
                    <div class="form-group">
                        <label for="teamBudget">Budget Allocated</label>
                        <input type="number" id="teamBudget" value="100" min="1" max="100" required>
                        <small>Maximum available budget</small>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Create Team</button>
                </form>
                <div id="teamError" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </template>

    <!-- Team Details Page Template -->
    <template id="team-page">
        <div class="team-container">
            <div class="team-header">
                <h1 id="teamTitle"></h1>
                <div class="team-stats">
                    <div class="stat-box">
                        <label>Total Points</label>
                        <strong id="teamPoints">0</strong>
                    </div>
                    <div class="stat-box">
                        <label>Budget Used</label>
                        <strong id="budgetUsed">0 / 100</strong>
                    </div>
                    <div class="stat-box">
                        <label>Players</label>
                        <strong id="playerCount">0 / 11</strong>
                    </div>
                </div>
                <button id="addPlayerBtn" class="btn-primary">+ Add Player</button>
                <button id="exportTeamBtn" class="btn-secondary">📊 Export Squad</button>
            </div>

            <div id="teamTabs" class="team-tabs"></div>

            <div class="players-section">
                <h2>Your Players</h2>
                <div id="playersList" class="players-list">
                    <!-- Players will be loaded here -->
                </div>
                <div id="noPlayers" class="empty-state" style="display: none;">
                    <p>No players added yet. Add players to your team!</p>
                </div>
            </div>

            <div class="back-link">
                <a href="#room" id="backToRoomLink" onclick="event.preventDefault(); Utils.navigate('room', TeamPage.currentRoomId)">&larr; Back to Room</a>
            </div>
        </div>
    </template>

    <!-- Add Player Modal Template -->
    <template id="add-player-modal">
        <div class="modal-overlay" id="playerModal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Add Player to Team</h2>
                    <button class="modal-close" id="closePlayerModal">&times;</button>
                </div>
                <form id="addPlayerForm" class="modal-form">
                    <div class="form-group">
                        <label for="playerSearch">Search Player</label>
                        <input type="text" id="playerSearch" placeholder="Search by name...">
                    </div>
                    <div id="playersList" class="players-search-list">
                        <!-- Popular players list -->
                    </div>
                    <div class="form-group">
                        <label for="playerName">Or Enter Player Name</label>
                        <input type="text" id="playerName" placeholder="Player name" required>
                    </div>
                    <div class="form-group">
                        <label for="playerTeam">IPL Team</label>
                        <input type="text" id="playerTeam" placeholder="e.g., RCB" required>
                    </div>
                    <div class="form-group">
                        <label for="playerRole">Role</label>
                        <select id="playerRole" required>
                            <option value="">Select role</option>
                            <option value="batsman">Batsman</option>
                            <option value="bowler">Bowler</option>
                            <option value="all-rounder">All-rounder</option>
                            <option value="wicket-keeper">Wicket-keeper</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-primary btn-full">Add Player</button>
                </form>
                <div id="playerError" class="error-message" style="display: none;"></div>
            </div>
        </div>
    </template>

    <!-- Team Export Modal Template -->
    <template id="team-export-modal">
        <div class="modal-overlay" id="exportModal">
            <div class="modal-content export-modal">
                <div class="modal-header">
                    <h2>Export Squad</h2>
                    <button class="modal-close" id="closeExportModal">&times;</button>
                </div>
                <div class="export-content" id="exportContent">
                    <!-- Will be populated by JS -->
                </div>
                <div class="modal-footer">
                    <button id="printExportBtn" class="btn-secondary">🖨️ Print</button>
                    <button id="copyLinkBtn" class="btn-secondary">🔗 Copy Link</button>
                    <button id="closeExportBtn" class="btn-primary">Close</button>
                </div>
            </div>
        </div>
    </template>

    <!-- Leaderboard Page Template -->
    <template id="leaderboard-page">
        <div class="leaderboard-container">
            <div class="leaderboard-header">
                <h1>Live Leaderboard</h1>
                <div class="leaderboard-controls">
                    <label>
                        <input type="checkbox" id="autoRefresh" checked> Auto-refresh
                    </label>
                    <button id="manualRefresh" class="btn-secondary">Refresh Now</button>
                </div>
            </div>

            <div class="match-status">
                <p id="matchStatus">No active match sync</p>
                <button id="startSyncBtn" class="btn-success">Start Match Sync</button>
            </div>

            <table class="leaderboard-table">
                <thead>
                    <tr>
                        <th>Rank</th>
                        <th>Team Name</th>
                        <th>Points</th>
                        <th>Players</th>
                        <th>Budget Used</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                    <!-- Leaderboard rows will be loaded here -->
                </tbody>
            </table>

            <div id="noLeaderboard" class="empty-state" style="display: none;">
                <p>No teams in this room yet.</p>
            </div>

            <div class="back-link">
                <a href="#dashboard">&larr; Back to Dashboard</a>
            </div>
        </div>
    </template>

    <!-- Error Notification -->
    <template id="error-notification">
        <div class="notification error">
            <span id="notificationText"></span>
            <button class="notification-close">&times;</button>
        </div>
    </template>

    <!-- Success Notification -->
    <template id="success-notification">
        <div class="notification success">
            <span id="notificationText"></span>
            <button class="notification-close">&times;</button>
        </div>
    </template>

    <!-- Scripts -->
    <script src="http://localhost:3000/socket.io/socket.io.js"></script>
    <script src="/js/socket.js"></script>
    <script src="/js/notifications.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/utils.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/pages/dashboard.js"></script>
    <script src="/js/pages/room.js"></script>
    <script src="/js/pages/team.js"></script>
    <script src="/js/pages/leaderboard.js"></script>
    <script src="/js/pages/playerPool.js"></script>
    <script src="/js/pages/auctionLive.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
